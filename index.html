<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BORA (보라) - 특수교육 수업 지원 어시스턴트 [Master V22]</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --highlight: #fbbf24;
            --progress-color: #10b981;
            --success-blue: #3b82f6;
            --error-red: #ef4444;
        }

        body { 
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif; 
            background: var(--bg-color); color: var(--text-main); 
            margin: 0; padding: 0; overflow: hidden; height: 100vh; 
            display: flex; flex-direction: column; user-select: none;
        }

        .status-bar { 
            height: 15vh; background: var(--card-bg); 
            display: flex; justify-content: space-around; align-items: center; 
            border-bottom: 4px solid var(--accent); box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            position: relative; padding: 0 60px;
        }
        .status-item { text-align: center; flex: 1; border-right: 1px solid rgba(255,255,255,0.1); }
        .status-item:last-child { border-right: none; }
        .status-label { font-size: 1vw; color: var(--text-sub); margin-bottom: 5px; font-weight: bold; }
        .status-value { font-size: clamp(18px, 2.2vw, 42px); font-weight: 900; color: var(--accent); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .main-display { height: 50vh; display: flex; justify-content: center; align-items: center; padding: 2vh; box-sizing: border-box; }
        .visual-card { 
            background: var(--card-bg); border-radius: 40px; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); border: 8px solid var(--accent);
            text-align: center; position: relative;
        }
        .big-emoji { font-size: 18vh; margin-bottom: 1vh; pointer-events: none; }
        .keyword-text { font-size: 8vh; font-weight: 900; color: var(--highlight); text-shadow: 4px 4px 20px rgba(0,0,0,0.8); pointer-events: none; }

        .notice-pop {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--success-blue); color: white; padding: 15px 40px;
            border-radius: 50px; font-weight: bold; z-index: 5000; display: none;
            font-size: 2vh; box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .controls { height: 35vh; background: rgba(15, 23, 42, 0.98); display: flex; flex-direction: column; align-items: center; justify-content: space-evenly; border-top: 3px solid #334155; padding: 10px; }
        .transcript-container { width: 95%; background: rgba(0,0,0,0.4); padding: 10px; border-radius: 20px; min-height: 6vh; display: flex; align-items: center; justify-content: center; border: 2px solid #475569; }
        .interim-text { color: #fff; font-size: 3vh; font-weight: 800; text-align: center; min-height: 1.2em; }

        .bottom-ui { width: 100%; display: flex; justify-content: center; align-items: center; gap: 15px; }
        .config-area { display: flex; gap: 8px; }
        .config-area input { background: #1e293b; border: 2px solid #334155; color: white; padding: 8px 12px; border-radius: 8px; font-size: 1.6vh; outline: none; }
        .change-btn { background: var(--accent); border: none; border-radius: 8px; color: white; font-weight: bold; padding: 0 15px; cursor: pointer; font-size: 1.6vh; }

        #recordBtn { padding: 1.2vh 4vw; font-size: 2.2vh; border-radius: 50px; border: none; background: var(--error-red); color: white; cursor: pointer; font-weight: 900; transition: 0.3s; }
        #recordBtn.active { background: #10b981; }

        .progress-container { position: absolute; bottom: 0; left: 0; width: 100%; height: 12px; background: rgba(255,255,255,0.1); }
        .progress-bar { width: 0%; height: 100%; background: var(--progress-color); transition: none; }
        .progress-bar.recorded { background: var(--success-blue) !important; width: 100% !important; }

        .overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(15, 23, 42, 0.98); z-index: 2000; display: none; padding: 5vh 10vw; box-sizing: border-box; backdrop-filter: blur(10px); }
        .overlay-content { background: var(--card-bg); border: 4px solid var(--accent); border-radius: 30px; padding: 4vh; height: 100%; overflow-y: auto; color: var(--text-main); }
        
        .icon-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(255,255,255,0.05); border: 2px solid var(--text-sub); color: var(--text-sub);
            width: 4.5vh; height: 4.5vh; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 2.2vh; transition: 0.3s;
        }
        .icon-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }

        @keyframes popIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
    <div id="noticePop" class="notice-pop">✨ 기록 완료</div>

    <div class="status-bar">
        <div class="status-item"><div class="status-label">학생 이름</div><div class="status-value" id="val-student">현00/송0</div></div>
        <div class="status-item"><div class="status-label">수업 교과</div><div class="status-value" id="val-subject">국어</div></div>
        <div class="status-item"><div class="status-label">수업 내용</div><div class="status-value" id="val-topic">준비 중</div></div>
        <div class="status-item"><div class="status-label">시스템 상태</div><div class="status-value" id="val-activity" style="color: var(--highlight);">👂 대기 중</div></div>
        <button class="icon-btn" style="right: 20px;" onclick="toggleOverlay('settingsOverlay')">⚙️</button>
    </div>

    <div class="main-display">
        <div class="visual-card" id="main-card" onclick="handleManualRecord()">
            <div class="big-emoji" id="main-emoji">👂</div>
            <div class="keyword-text" id="main-word">준비 중...</div>
            <div class="progress-container"><div class="progress-bar" id="p-bar"></div></div>
        </div>
    </div>

    <div class="controls">
        <div class="transcript-container">
            <div class="interim-text" id="interim-display">버튼을 눌러 수업을 시작하세요</div>
        </div>
        
        <div class="bottom-ui">
            <div class="config-area">
                <input type="text" id="subjectInput" placeholder="교과" style="width: 8vw;" value="국어">
                <input type="text" id="topicInput" placeholder="주제" style="width: 15vw;">
                <input type="number" id="delayInput" placeholder="초" style="width: 4vw;" min="1" value="10">
                <button class="change-btn" onclick="updateUIContext()">변경</button>
            </div>
            <button id="recordBtn" onclick="toggleListening()">▶️ 수업 시작</button>
        </div>
    </div>

    <div id="settingsOverlay" class="overlay">
        <div class="overlay-content">
            <h2 style="color:var(--accent);">⚙️ 수업 및 환경 설정</h2>
            <label>학생 이름</label><br><input type="text" id="set-student-name" style="width:90%; padding:15px; margin:10px 0; background:#0f172a; border:1px solid var(--accent); color:white;"><br>
            <div style="margin-top:30px; display:flex; gap:15px;">
                <button onclick="saveSettings()" style="flex:1; padding:20px; background:var(--accent); border:none; border-radius:10px; color:white; font-weight:bold; cursor:pointer;">설정 저장</button>
                <button onclick="exportCSV()" style="flex:1; padding:20px; background:#10b981; border:none; border-radius:10px; color:white; font-weight:bold; cursor:pointer;">📊 CSV 데이터 추출</button>
                <button onclick="toggleOverlay('settingsOverlay')" style="flex:1; padding:20px; background:#475569; border:none; border-radius:10px; color:white; font-weight:bold; cursor:pointer;">닫기</button>
            </div>
            <button onclick="clearLogs()" style="margin-top:30px; width:100%; padding:10px; background:var(--error-red); border:none; color:white; cursor:pointer; width:100%;">⚠️ 모든 데이터 삭제</button>
        </div>
    </div>

    <script>
        // [로컬 100대 행동 지시어 DB]
        const instruction_db = {
            "앉으세요": "🪑", "일어나세요": "🧍", "제자리": "🔙", "허리펴기": "🧘", "정면보기": "👁️",
            "책상정리": "🧹", "가방놓기": "🎒", "의자당기기": "🪑", "필통꺼내기": "✏️", "책꺼내기": "📚",
            "준비물확인": "🎒", "교과서펴기": "📖", "공책펴기": "📝", "날짜쓰기": "📅", "이름쓰기": "👤",
            "바른자세": "🧘", "손무릎": "👐", "발모으기": "🦶", "심호흡": "🌬️", "미소짓기": "😊",
            "여기보세요": "🎯", "칠판보세요": "👨‍🏫", "선생님보세요": "👩‍🏫", "화면보세요": "🖥️", "나를봐요": "👁️",
            "주목": "📢", "집중하세요": "🎯", "눈맞춤": "👁️", "손가락집중": "☝️", "불끄기": "💡",
            "그림보세요": "🖼️", "글자보세요": "🔤", "가리키기": "☝️", "밑줄보세요": "〰️", "색깔확인": "🎨",
            "눈크게": "👀", "깜빡이지않기": "👁️", "고개돌리기": "🔄", "지시봉보기": "🦯", "화살표보기": "➡️",
            "연필잡기": "✏️", "글씨쓰기": "✍️", "줄긋기": "📏", "동그라미": "⭕", "색칠하기": "🖍️",
            "가위질": "✂️", "풀칠하기": "🧴", "붙이기": "📋", "오리기": "✂️", "접기": "📄",
            "번호매기기": "1️⃣", "단어찾기": "🔍", "선잇기": "🔗", "빈칸채우기": "📥", "스티커붙이기": "✨",
            "넘기기": "📑", "덮기": "📕", "카드고르기": "🃏", "버튼누르기": "🔘", "마우스클릭": "🖱️",
            "키보드입력": "⌨️", "태블릿켜기": "📱", "탭하기": "👆", "드래그": "🖱️", "확대하기": "🔍",
            "들으세요": "👂", "말하세요": "🗣️", "따라하기": "🗣️", "큰소리로": "📢", "또박또박": "🗣️",
            "손들기": "🙋", "발표하기": "🙋", "대답하기": "💬", "질문하기": "❓", "도움요청": "🆘",
            "친구랑인사": "🤝", "하이파이브": "🙌", "박수세번": "👏", "고개끄덕": "🙆", "손흔들기": "👋",
            "조용히": "🤫", "기다려요": "⏳", "멈추세요": "🛑", "차례지키기": "🚶", "줄서기": "🚶",
            "천천히하기": "🐢", "다시하기": "🔄", "끝까지하기": "🏁", "포기하지않기": "💪", "쉬는시간": "⏰",
            "뒷정리": "🧹", "쓰레기줍기": "🗑️", "가방싸기": "🎒", "인사하고가기": "🙇", "인사합시다": "🙇"
        };
        const praise_db = ["잘했어", "잘했어요", "좋아", "좋아요", "최고", "그렇지", "맞아", "성공", "훌륭해", "정답", "딩동댕", "그래", "오케이", "최고야"];

        // 상태 관리
        const APP_STATE = { READY: 'ready', MEASURING: 'measuring', SUCCESS: 'success' };
        let currentState = APP_STATE.READY;

        let isListening = false;
        let studentName = "현00/송0", currentSubject = "국어", currentTopic = "준비 중", targetDelay = 10;
        let recognition, animationFrameId, currentLog = null, logs = [];
        
        // [V22 핵심] 이전 인덱스 락
        let lastProcessedIndex = 0; 

        function init() {
            const saved = JSON.parse(localStorage.getItem('bora_settings_v21') || '{}');
            studentName = saved.name || "현00/송0";
            logs = JSON.parse(localStorage.getItem('bora_research_logs_v21') || '[]');
            document.getElementById('val-student').innerText = studentName;
            setupRecognition();
        }

        function setupRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return alert("브라우저가 음성 인식을 지원하지 않습니다.");

            recognition = new SpeechRecognition();
            recognition.lang = 'ko-KR';
            recognition.continuous = true; 
            recognition.interimResults = true;

            recognition.onresult = (event) => {
                if (currentState === APP_STATE.SUCCESS) return;

                // [V22] lastProcessedIndex 이후의 결과만 처리하여 중복 방지
                for (let i = lastProcessedIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript.trim();
                    const cleanText = transcript.replace(/\s/g, "");
                    
                    if (!cleanText) continue;
                    document.getElementById('interim-display').innerText = transcript;

                    if (currentState === APP_STATE.MEASURING) {
                        // [6단계-5] 측정 중: 오직 칭찬어만 인식
                        if (praise_db.some(p => cleanText.includes(p.replace(/\s/g, "")))) {
                            lastProcessedIndex = event.results.length; // 현재까지의 모든 버퍼 락
                            completeLog("자동");
                            break;
                        }
                    } else if (currentState === APP_STATE.READY) {
                        // [6단계-2] 대기 중: 지시어 탐색
                        for (let key in instruction_db) {
                            if (cleanText.includes(key)) {
                                lastProcessedIndex = event.results.length; // 현재까지의 모든 버퍼 락
                                startMeasuring(key, instruction_db[key]);
                                break;
                            }
                        }
                    }
                }
            };

            recognition.onend = () => { if (isListening) setTimeout(() => { try { recognition.start(); } catch(e){} }, 50); };
        }

        function startMeasuring(word, emoji) {
            currentState = APP_STATE.MEASURING;
            currentLog = { student: studentName, subject: currentSubject, topic: currentTopic, keyword: word, startTime: Date.now() };
            
            document.getElementById('main-word').innerText = word;
            document.getElementById('main-emoji').innerText = emoji;
            document.getElementById('val-activity').innerText = "⏱️ 수업 중";
            
            const card = document.getElementById('main-card');
            card.style.animation = 'none'; 
            card.offsetHeight;
            card.style.animation = 'popIn 0.5s forwards';
            
            cancelAnimationFrame(animationFrameId);
            runTimer();
        }

        function runTimer() {
            if (currentState !== APP_STATE.MEASURING) return;
            const elapsed = Date.now() - currentLog.startTime;
            const progress = Math.max(0, (1 - (elapsed / (targetDelay * 1000))) * 100);
            document.getElementById('p-bar').style.width = progress + '%';
            if (progress <= 0) handleTimeout();
            else animationFrameId = requestAnimationFrame(runTimer);
        }

        function completeLog(method) {
            if (currentState !== APP_STATE.MEASURING) return;
            currentState = APP_STATE.SUCCESS; // 성공 상태로 전환하여 인식 차단
            
            const latency = ((Date.now() - currentLog.startTime) / 1000).toFixed(1);
            logs.push({ student: studentName, subject: currentSubject, topic: currentTopic, time: new Date().toLocaleTimeString(), keyword: currentLog.keyword, latency: latency, result: "성공", method: method });
            localStorage.setItem('bora_research_logs_v21', JSON.stringify(logs));
            
            showNotice(`✨ ${latency}초 기록 완료`);
            document.getElementById('p-bar').classList.add('recorded');
            document.getElementById('p-bar').style.width = '100%';
            
            // [6단계-6] 즉시 초기화 후 다음 지시 대기
            setTimeout(resetToReady, 500); 
        }

        function handleTimeout() {
            if (currentState !== APP_STATE.MEASURING) return;
            currentState = APP_STATE.SUCCESS;
            
            logs.push({ student: studentName, subject: currentSubject, topic: currentTopic, time: new Date().toLocaleTimeString(), keyword: currentLog.keyword, latency: targetDelay.toFixed(1), result: "타임아웃", method: "자동" });
            localStorage.setItem('bora_research_logs_v21', JSON.stringify(logs));
            showNotice(`⏰ 시간 초과`);
            resetToReady();
        }

        function resetToReady() {
            currentState = APP_STATE.READY;
            currentLog = null;
            document.getElementById('main-word').innerText = "다음 지시 준비";
            document.getElementById('main-emoji').innerText = "👂";
            document.getElementById('val-activity').innerText = "👂 지시 대기";
            document.getElementById('interim-display').innerText = "";
            document.getElementById('p-bar').style.width = '0%';
            document.getElementById('p-bar').classList.remove('recorded');
        }

        function handleManualRecord() { if (currentState === APP_STATE.MEASURING) completeLog("수동터치"); }

        function toggleListening() {
            const btn = document.getElementById('recordBtn');
            if (!isListening) {
                isListening = true; 
                lastProcessedIndex = 0; // 시작 시 초기화
                recognition.start();
                btn.innerText = "⏹️ 수업 중지"; btn.classList.add('active');
                document.getElementById('interim-display').innerText = "지시를 기다리는 중...";
            } else {
                isListening = false; recognition.stop();
                btn.innerText = "▶️ 수업 시작"; btn.classList.remove('active');
            }
        }

        function updateUIContext() {
            currentSubject = document.getElementById('subjectInput').value || "국어";
            currentTopic = document.getElementById('topicInput').value || "준비 중";
            targetDelay = parseInt(document.getElementById('delayInput').value) || 10;
            document.getElementById('val-subject').innerText = currentSubject;
            document.getElementById('val-topic').innerText = currentTopic;
            alert('수업 정보가 적용되었습니다.');
        }

        function showNotice(msg) {
            const n = document.getElementById('noticePop');
            n.innerText = msg; n.style.display = 'block';
            setTimeout(() => n.style.display = 'none', 1500);
        }

        function toggleOverlay(id) { document.getElementById(id).style.display = (document.getElementById(id).style.display === 'block') ? 'none' : 'block'; }

        function saveSettings() {
            localStorage.setItem('bora_settings_v21', JSON.stringify({name: document.getElementById('set-student-name').value || "현00/송0"}));
            location.reload();
        }

        function exportCSV() {
            if (logs.length === 0) return alert("기록된 데이터가 없습니다.");
            let csv = "\uFEFF회기,학생명,교과,주제,시간,지시어,지연시간(초),결과,방식\n";
            logs.forEach((l, idx) => { csv += `${idx+1},${l.student},${l.subject},${l.topic},${l.time},${l.keyword},${l.latency},${l.result},${l.method}\n`; });
            const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `BORA_수업데이터.csv`; a.click();
        }

        function clearLogs() { if(confirm("데이터를 삭제할까요?")) { localStorage.clear(); location.reload(); } }
        window.onload = init;
    </script>
</body>
</html>
