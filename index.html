<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BORA (보라) - 특수교육 연구용 AI 어시스턴트</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --highlight: #fbbf24;
            --progress-color: #10b981;
            --success-blue: #3b82f6;
            --error-red: #ef4444;
        }

        body { 
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif; 
            background: var(--bg-color); color: var(--text-main); 
            margin: 0; padding: 0; overflow: hidden; height: 100vh; 
            display: flex; flex-direction: column; 
            user-select: none;
        }

        /* 상단 상태 바 */
        .status-bar { 
            height: 15vh; background: var(--card-bg); 
            display: flex; justify-content: space-around; align-items: center; 
            border-bottom: 4px solid var(--accent); box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            position: relative; padding: 0 60px;
        }
        .status-item { text-align: center; flex: 1; display: flex; flex-direction: column; }
        .status-label { font-size: 1.2vw; color: var(--text-sub); margin-bottom: 5px; font-weight: bold; }
        .status-value { font-size: clamp(24px, 2.8vw, 52px); font-weight: 900; color: var(--accent); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .icon-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(255,255,255,0.05); border: 2px solid var(--text-sub); color: var(--text-sub);
            width: 4.5vh; height: 4.5vh; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 2.2vh; transition: 0.3s;
        }
        .icon-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }

        /* 메인 카드 */
        .main-display { height: 55vh; display: flex; justify-content: center; align-items: center; padding: 2vh; box-sizing: border-box; }
        .visual-card { 
            background: var(--card-bg); border-radius: 40px; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); border: 8px solid var(--accent);
            text-align: center; position: relative; cursor: pointer;
            transition: 0.3s;
        }
        .visual-card:active { transform: scale(0.98); }
        
        .big-emoji { font-size: 18vh; margin-bottom: 1vh; pointer-events: none; }
        .keyword-text { font-size: 9vh; font-weight: 900; color: var(--highlight); text-shadow: 4px 4px 20px rgba(0,0,0,0.8); pointer-events: none; }

        .notice-pop {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--success-blue); color: white; padding: 12px 30px;
            border-radius: 50px; font-weight: bold; z-index: 5000;
            display: none; box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
            font-size: 2vh;
        }

        /* 하단 컨트롤 */
        .controls { height: 30vh; background: rgba(15, 23, 42, 0.98); display: flex; flex-direction: column; align-items: center; justify-content: space-evenly; border-top: 3px solid #334155; padding: 10px; }
        .transcript-container { width: 95%; background: rgba(0,0,0,0.4); padding: 10px; border-radius: 20px; min-height: 7vh; display: flex; align-items: center; justify-content: center; border: 2px solid #475569; }
        .interim-text { color: #fff; font-size: 3vh; font-weight: 800; text-align: center; min-height: 1.2em; }

        .bottom-ui { width: 100%; display: flex; justify-content: center; align-items: center; gap: 15px; }
        .config-area { display: flex; gap: 8px; }
        .config-area input { background: #1e293b; border: 2px solid #334155; color: white; padding: 8px 12px; border-radius: 8px; font-size: 1.6vh; outline: none; }
        .change-btn { background: var(--accent); border: none; border-radius: 8px; color: white; font-weight: bold; padding: 0 15px; cursor: pointer; font-size: 1.6vh; }

        #recordBtn { padding: 1.2vh 4vw; font-size: 2vh; border-radius: 50px; border: none; background: var(--error-red); color: white; cursor: pointer; font-weight: 900; transition: 0.3s; }
        #recordBtn.active { background: #10b981; }

        .progress-container { position: absolute; bottom: 0; left: 0; width: 100%; height: 12px; background: rgba(255,255,255,0.1); }
        .progress-bar { width: 0%; height: 100%; background: var(--progress-color); transition: width 0.1s linear; }
        .progress-bar.recorded { background: var(--success-blue) !important; width: 100% !important; }

        .overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(15, 23, 42, 0.98); z-index: 2000; display: none; padding: 5vh 10vw; box-sizing: border-box; backdrop-filter: blur(10px); }
        .overlay-content { background: var(--card-bg); border: 4px solid var(--accent); border-radius: 30px; padding: 4vh; height: 100%; overflow-y: auto; color: var(--text-main); }
        
        @keyframes popIn { from { transform: scale(0.98); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
    <div id="noticePop" class="notice-pop">✨ 기록 완료</div>

    <div class="status-bar">
        <div class="status-item">
            <div class="status-label">현재 과목</div>
            <div class="status-value" id="val-subject">국어</div>
        </div>
        <div class="status-item" style="border-left: 2px solid #334155; border-right: 2px solid #334155;">
            <div class="status-label">수업 주제</div>
            <div class="status-value" id="val-topic">준비 중</div>
        </div>
        <div class="status-item">
            <div class="status-label">진행 행동</div>
            <div class="status-value" id="val-activity" style="color: var(--highlight);">대기 중</div>
        </div>
        <button class="icon-btn" style="right: 70px;" onclick="toggleOverlay('helpOverlay')">?</button>
        <button class="icon-btn" style="right: 20px;" onclick="openSettings()">⚙️</button>
    </div>

    <div class="main-display">
        <div class="visual-card" id="main-card" onclick="handleManualRecord()">
            <div class="big-emoji" id="main-emoji">👂</div>
            <div class="keyword-text" id="main-word">수업 시작을 눌러주세요</div>
            <div class="progress-container"><div class="progress-bar" id="p-bar"></div></div>
        </div>
    </div>

    <div class="controls">
        <div class="transcript-container">
            <div class="interim-text" id="interim-display">선생님의 말씀을 기다리고 있어요...</div>
        </div>
        
        <div class="bottom-ui">
            <div class="config-area">
                <input type="text" id="subjectInput" placeholder="과목" value="국어" style="width: 8vw;">
                <input type="text" id="topicInput" placeholder="주제" style="width: 15vw;">
                <input type="number" id="delayInput" placeholder="초" style="width: 4vw;" min="1" value="10">
                <button class="change-btn" onclick="updateSettings()">변경</button>
            </div>
            <button id="recordBtn" onclick="toggleListening()">▶️ 수업 시작</button>
        </div>
    </div>

    <!-- 도움말 오버레이 -->
    <div id="helpOverlay" class="overlay">
        <div class="overlay-content">
            <h1 style="color:var(--accent);">BORA 정밀 연구 가이드</h1>
            <p>1. [수업 시작] 후 마이크 허용</p>
            <p>2. 지시어 감지 시 측정 시작 -> 칭찬어("잘했어") 발화 시 기록 및 <b>즉시 엔진 리셋</b></p>
            <p>3. 엔진 리셋은 이전 음성 잔상을 지워 중복 기록 오류를 방지합니다.</p>
            <button onclick="toggleOverlay('helpOverlay')" style="padding:10px 30px; cursor:pointer; margin-top:20px;">닫기</button>
        </div>
    </div>

    <!-- 설정 오버레이 -->
    <div id="settingsOverlay" class="overlay">
        <div class="overlay-content">
            <h2 style="color:var(--accent);">⚙️ 연구 및 시스템 설정</h2>
            <label>학생 이름</label><br><input type="text" id="set-student-name" style="width:90%; padding:10px; margin:10px 0;"><br>
            <label>Gemini API 키</label><br><input type="password" id="set-api-key" style="width:90%; padding:10px; margin:10px 0;"><br>
            <label>AI 하이브리드 모드</label>
            <select id="set-ai-active" style="width:95%; padding:10px; margin:10px 0;">
                <option value="false">비활성화</option><option value="true">활성화</option>
            </select>
            <div style="margin-top:20px; display:flex; gap:10px;">
                <button onclick="saveAllSettings()" style="flex:1; padding:15px; background:var(--accent); border:none; color:white; font-weight:bold; cursor:pointer;">설정 저장</button>
                <button onclick="exportToCSV()" style="flex:1; padding:15px; background:#10b981; border:none; color:white; cursor:pointer;">CSV 추출</button>
                <button onclick="toggleOverlay('settingsOverlay')" style="flex:1; padding:15px; background:#475569; border:none; color:white; cursor:pointer;">닫기</button>
            </div>
            <button onclick="clearResearchLogs()" style="margin-top:20px; padding:10px; background:var(--error-red); border:none; color:white; cursor:pointer; width:100%;">누적 데이터 전체 삭제</button>
        </div>
    </div>

    <script>
        const activity_keywords = {
            "앉으세요": {text: "자리에 앉기", emoji: "🪑"}, "일어나세요": {text: "일어나기", emoji: "🧍"},
            "펴세요": {text: "책 펴기", emoji: "📖"}, "보세요": {text: "화면 보기", emoji: "👀"},
            "집중": {text: "여기 집중!", emoji: "🎯"}, "조용": {text: "조용히 하기", emoji: "🤫"},
            "최고": {text: "최고예요!", emoji: "👍"}, "읽으세요": {text: "소리내어 읽기", emoji: "🗣️"},
            "인사": {text: "인사하기", emoji: "🙇"}, "정리": {text: "정리하기", emoji: "🧹"}
        };
        const subject_db = {
            "국어": "📝", "수학": "🔢", "사회": "🗺️", "과학": "🧪", "음악": "🎵", "체육": "⚽"
        };
        const positiveTriggers = ["잘했어", "잘했어요", "좋아요", "최고", "맞아요", "그래", "성공", "훌륭해", "정답"];
        
        let isListening = false, currentSubject = "국어", targetDelay = 10, studentName = "학생A";
        let geminiApiKey = "", isAiActive = false, researchLogs = [], currentLogEntry = null;
        let recognition, countdownTimer, lastVisualUpdate = 0, lastResetTime = 0;
        let isHardResetting = false; // 엔진 재시작 상태 플래그

        function initApp() {
            const saved = JSON.parse(localStorage.getItem('bora_settings') || '{}');
            studentName = saved.studentName || "학생A";
            targetDelay = saved.targetDelay || 10;
            geminiApiKey = saved.geminiApiKey || "";
            isAiActive = saved.isAiActive || false;
            currentSubject = saved.currentSubject || "국어";
            researchLogs = JSON.parse(localStorage.getItem('bora_research_logs') || '[]');
            
            document.getElementById('val-subject').innerText = currentSubject;
            document.getElementById('subjectInput').value = currentSubject;
            document.getElementById('delayInput').value = targetDelay;
            
            setupRecognition();
        }

        function setupRecognition() {
            window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (window.SpeechRecognition) {
                recognition = new SpeechRecognition();
                recognition.lang = 'ko-KR'; recognition.continuous = true; recognition.interimResults = true;
                
                recognition.onresult = handleSpeechResult;
                recognition.onend = () => { 
                    if(isListening) {
                        // 하드 리셋 중이 아닐 때만 일반적인 재시작
                        let delay = isHardResetting ? 300 : 100;
                        setTimeout(() => {
                            try { recognition.start(); isHardResetting = false; } catch(e) {}
                        }, delay);
                    } 
                };
                recognition.onerror = (e) => console.error("Mic Error:", e.error);
            }
        }

        function handleSpeechResult(event) {
            if (Date.now() - lastResetTime < 1000) return; // 칭찬 후 1초간 강제 무시

            let interim = '', final = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) final += event.results[i][0].transcript;
                else interim += event.results[i][0].transcript;
            }
            const text = (final + interim).trim();
            if(!text) return;
            
            document.getElementById('interim-display').innerText = text;

            // [1순위] 긍정 트리거 감지 -> 즉시 마감 및 하드 리셋
            if (currentLogEntry && currentLogEntry.latency === "N/A") {
                if (positiveTriggers.some(t => text.includes(t))) {
                    completeResearchMeasurement("자동");
                    return; 
                }
            }

            // [2순위] 지시어 인식 (기록 대기 중일 때만)
            if (!currentLogEntry || currentLogEntry.latency !== "N/A") {
                processKeywords(text, !!final);
            }
        }

        async function processKeywords(text, isFinal) {
            const now = Date.now();
            if (now - lastVisualUpdate < 2000) return; 

            let foundWord = null, foundEmoji = null, foundType = null;

            // 로컬 행동우선
            for (let key in activity_keywords) {
                if (text.includes(key)) {
                    foundWord = activity_keywords[key].text;
                    foundEmoji = activity_keywords[key].emoji;
                    foundType = '로컬'; break;
                }
            }

            // AI 하이브리드 (로컬 실패 시 문장 완성 단계에서만)
            if (!foundWord && isFinal && isAiActive && geminiApiKey) {
                const aiResult = await callGemini(text);
                if (aiResult) {
                    foundWord = aiResult.word; foundEmoji = aiResult.emoji; foundType = 'AI';
                }
            }

            if (foundWord) updateVisual(foundWord, foundEmoji, foundType);
        }

        function updateVisual(word, emoji, type) {
            lastVisualUpdate = Date.now();
            document.getElementById('main-word').innerText = word;
            document.getElementById('main-emoji').innerText = emoji;
            document.getElementById('val-activity').innerText = word;
            const card = document.getElementById('main-card');
            card.style.animation = 'none'; card.offsetHeight; card.style.animation = 'popIn 0.5s forwards';
            startCountdown();
            startResearch(word, type);
        }

        function startCountdown() {
            if (countdownTimer) clearInterval(countdownTimer);
            const bar = document.getElementById('p-bar');
            let width = 100; bar.classList.remove('recorded');
            const step = 100 / (targetDelay * 10);
            countdownTimer = setInterval(() => {
                width -= step; bar.style.width = Math.max(0, width) + '%';
                if (width <= 0) { clearInterval(countdownTimer); handleTimeout(); }
            }, 100);
        }

        function startResearch(keyword, type) {
            currentLogEntry = { student: studentName, time: new Date().toLocaleTimeString(), type: type, keyword: keyword, latency: "N/A", startTime: Date.now() };
            researchLogs.push(currentLogEntry);
            localStorage.setItem('bora_research_logs', JSON.stringify(researchLogs));
        }

        function handleManualRecord() {
            if (currentLogEntry && currentLogEntry.latency === "N/A") completeResearchMeasurement("수동");
        }

        function completeResearchMeasurement(method) {
            if (!currentLogEntry || currentLogEntry.latency !== "N/A") return;
            const latency = ((Date.now() - currentLogEntry.startTime) / 1000).toFixed(1);
            currentLogEntry.latency = latency;
            currentLogEntry.method = method;
            
            if (countdownTimer) clearInterval(countdownTimer);
            localStorage.setItem('bora_research_logs', JSON.stringify(researchLogs));
            
            lastResetTime = Date.now();
            const notice = document.getElementById('noticePop');
            notice.innerText = `✨ ${latency}초 기록 완료 (${method})`;
            notice.style.display = 'block';
            setTimeout(() => { notice.style.display = 'none'; }, 1500);
            
            // [중요] 음성 엔진 하드 리셋: 이전 버퍼를 물리적으로 제거
            isHardResetting = true;
            recognition.stop(); 
            resetToReady(); 
        }

        function resetToReady() {
            document.getElementById('main-word').innerText = "다음 지시 준비";
            document.getElementById('main-emoji').innerText = "👂";
            document.getElementById('val-activity').innerText = "대기 중";
            document.getElementById('interim-display').innerText = ""; 
            const bar = document.getElementById('p-bar');
            bar.style.width = '0%';
            lastVisualUpdate = 0; 
            currentLogEntry = null; 
        }

        function handleTimeout() { 
            if (currentLogEntry && currentLogEntry.latency === "N/A") { 
                currentLogEntry.latency = "Timeout"; 
                isHardResetting = true;
                recognition.stop();
                resetToReady(); 
            } 
        }

        async function callGemini(text) {
            const displayArea = document.getElementById('interim-display');
            displayArea.innerHTML = `<span style="color:var(--accent); animation:pulse 1s infinite;">🤖 AI 지시 분석 중...</span>`;
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${geminiApiKey}`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: `특수교육 교사의 말 "${text}"에서 학생 행동 키워드(2-4자)와 이모지를 JSON {"word":"단어","emoji":"이모지"} 형식으로만 추출해줘.` }] }] })
                });
                const data = await response.json();
                const jsonText = data.candidates[0].content.parts[0].text;
                const match = jsonText.match(/\{.*?\}/);
                return JSON.parse(match[0]);
            } catch (e) { return null; }
        }

        function toggleListening() {
            const btn = document.getElementById('recordBtn');
            if (!isListening) { try { recognition.start(); isListening = true; btn.innerText = "⏹️ 수업 중지"; btn.classList.add('active'); } catch(e){} }
            else { recognition.stop(); isListening = false; btn.innerText = "▶️ 수업 시작"; btn.classList.remove('active'); }
        }

        function updateSettings() {
            const sub = document.getElementById('subjectInput').value.trim();
            const top = document.getElementById('topicInput').value.trim();
            const del = document.getElementById('delayInput').value;
            if(sub) { currentSubject = sub; document.getElementById('val-subject').innerText = sub; }
            if(top) document.getElementById('val-topic').innerText = top;
            if(del) targetDelay = parseInt(del);
            saveAllSettings(true);
        }

        function toggleOverlay(id) { const el = document.getElementById(id); el.style.display = el.style.display === 'block' ? 'none' : 'block'; }
        function openSettings() {
            document.getElementById('set-student-name').value = studentName;
            document.getElementById('set-api-key').value = geminiApiKey;
            document.getElementById('set-ai-active').value = isAiActive.toString();
            toggleOverlay('settingsOverlay');
        }
        function saveAllSettings(isQuick = false) {
            studentName = document.getElementById('set-student-name').value;
            geminiApiKey = document.getElementById('set-api-key').value;
            isAiActive = document.getElementById('set-ai-active').value === 'true';
            localStorage.setItem('bora_settings', JSON.stringify({studentName, targetDelay, currentSubject, geminiApiKey, isAiActive}));
            if(!isQuick) { alert('설정이 저장되었습니다.'); location.reload(); }
        }
        function exportToCSV() {
            if(researchLogs.length === 0) { alert('데이터가 없습니다.'); return; }
            let csv = "\uFEFF학생명,시간,유형,키워드,지연시간,방식\n" + researchLogs.map(l => `${l.student},${l.time},${l.type},${l.keyword},${l.latency},${l.method}`).join("\n");
            const blob = new Blob([csv], {type: 'text/csv'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `bora_data.csv`; a.click();
        }
        function clearResearchLogs() { if(confirm("전체 삭제할까요?")) { localStorage.removeItem('bora_research_logs'); location.reload(); } }
        window.onload = initApp;
    </script>
</body>
</html>
