<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BORA v2.1 Research Edition - Integrity Verified</title>
    <style>
        :root {
            --bg-color: #0A0A0A;
            --surface-color: #1A1A1A;
            --primary-yellow: #FFD700;
            --primary-cyan: #00E5FF;
            --text-main: #FFFFFF;
            --text-dim: #999999;
            --danger: #FF3D00;
            --success: #00E676;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', 'Inter', sans-serif; }

        body { background-color: var(--bg-color); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        header { padding: 1.2rem 2.5rem; background: var(--surface-color); display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--primary-cyan); }

        .status-badge { padding: 0.6rem 1.2rem; border-radius: 30px; font-weight: 800; font-size: 0.85rem; letter-spacing: 0.5px; }
        .status-idle { background: #333; color: var(--text-dim); }
        .status-processing { background: var(--primary-yellow); color: #000; animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }

        #visual-card {
            width: 85vw; max-width: 650px; aspect-ratio: 1/1; background: var(--surface-color); border-radius: 50px;
            border: 10px solid var(--primary-yellow); display: none; flex-direction: column; justify-content: center;
            align-items: center; text-align: center; box-shadow: 0 0 70px rgba(255, 215, 0, 0.15); z-index: 10;
        }

        #visual-card.active { display: flex; animation: zoomIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes zoomIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .emoji-display { font-size: 16rem; margin-bottom: 0.5rem; }
        .word-display { font-size: 6rem; font-weight: 900; color: var(--primary-yellow); text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }

        #timer-container { width: 85vw; max-width: 650px; height: 25px; background: #222; border-radius: 15px; margin-top: 3rem; overflow: hidden; display: none; }
        #timer-bar { width: 100%; height: 100%; background: linear-gradient(90deg, var(--primary-cyan), #00B0FF); transition: width 0.1s linear; }

        #log-panel {
            position: fixed; right: 0; top: 0; width: 350px; height: 100%; background: var(--surface-color);
            border-left: 2px solid #333; padding: 2rem; transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100; box-shadow: -15px 0 40px rgba(0,0,0,0.6);
        }
        #log-panel.open { transform: translateX(0); }

        .log-item { padding: 1.2rem; border-bottom: 1px solid #333; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .fab-group { position: fixed; bottom: 2.5rem; right: 2.5rem; display: flex; flex-direction: column; gap: 1.2rem; z-index: 50; }
        button {
            width: 70px; height: 70px; border-radius: 50%; border: none; cursor: pointer;
            background: var(--primary-cyan); color: #000; font-size: 1.8rem; box-shadow: 0 6px 25px rgba(0,0,0,0.5);
            transition: all 0.2s;
        }
        button:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(0,229,255,0.4); }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 200; }
        .modal-content { background: var(--surface-color); padding: 3rem; border-radius: 40px; width: 95%; max-width: 500px; border: 2px solid #333; }
        input { width: 100%; padding: 1.2rem; background: #252525; border: 2px solid #444; color: white; border-radius: 15px; font-size: 1.1rem; margin-top: 0.5rem; }
        input:focus { border-color: var(--primary-cyan); outline: none; }
    </style>
</head>
<body>

    <header>
        <div>
            <h1 style="color: var(--primary-cyan); font-size: 1.8rem;">BORA <span style="font-size: 0.9rem; color: var(--text-dim); font-weight: 400;">v2.1 Integrity Edition</span></h1>
            <p id="info-display" style="font-size: 0.9rem; color: var(--text-dim); margin-top: 4px;">준비됨</p>
        </div>
        <div id="engine-status" class="status-badge status-idle">IDLE: 지시 대기</div>
    </header>

    <main>
        <div id="visual-card">
            <div id="card-emoji" class="emoji-display"></div>
            <div id="card-word" class="word-display"></div>
        </div>
        <div id="timer-container"><div id="timer-bar"></div></div>
        <p id="transcript-preview" style="position:absolute; bottom: 8rem; color: #444; font-size: 1rem;"></p>
    </main>

    <div id="log-panel">
        <h2 style="margin-bottom: 2rem;">연구 데이터 센터</h2>
        <div id="log-container" style="height: calc(100% - 150px); overflow-y: auto; background: #111; border-radius: 20px;"></div>
        <button onclick="exportCSV()" style="width: 100%; border-radius: 15px; margin-top: 1.5rem; font-size: 1rem; font-weight: bold; height: 55px;">📥 분석 데이터 추출 (CSV)</button>
    </div>

    <div class="fab-group">
        <button onclick="toggleLogs()">📊</button>
        <button onclick="openSettings()">⚙️</button>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <h2 style="color: var(--primary-cyan); margin-bottom: 2rem;">연구 환경 설정</h2>
            <div style="margin-bottom: 1.5rem;">
                <label style="color: #888;">대상 학생</label>
                <input type="text" id="student-name" placeholder="학생 성함">
            </div>
            <div style="margin-bottom: 1.5rem;">
                <label style="color: #888;">연구 과제</label>
                <input type="text" id="subject-topic" placeholder="예: 언어 지원 - 행동 지시">
            </div>
            <div style="margin-bottom: 2rem;">
                <label style="color: #888;">목표 대기 시간 (초)</label>
                <input type="number" id="target-delay" value="10">
            </div>
            <div style="display: flex; gap: 1rem;">
                <button onclick="saveSettings()" style="flex: 2; border-radius: 15px; font-size: 1rem; height: 55px;">저장 및 시작</button>
                <button onclick="closeSettings()" style="flex: 1; border-radius: 15px; font-size: 1rem; height: 55px; background: #333; color: white;">닫기</button>
            </div>
        </div>
    </div>

    <script>
        // 무결성 지시어 DB 100선 (행동 중심 핵심어 추출)
        const activity_keywords = {
            "앉으세요": "🪑", "일어나세요": "🧍", "기다리세요": "⏳", "보세요": "👀", "들으세요": "👂",
            "멈추세요": "✋", "정리하세요": "🧹", "가져오세요": "📥", "넣으세요": "🗳️", "주세요": "🤲",
            "손드세요": "✋", "손내리세요": "👇", "박수치세요": "👏", "인사하세요": "🙇", "정렬하세요": "🚶",
            "줄서세요": "🚶", "청소하세요": "🧹", "닦으세요": "🧽", "버리세요": "🗑️", "펼치세요": "📖",
            "덮으세요": "📕", "쓰세요": "✍️", "그리세요": "🎨", "칠하세요": "🖍️", "오리세요": "✂️",
            "붙이세요": "🩹", "접으세요": "📂", "찢으세요": "🚫", "누르세요": "🔘", "당기세요": "🏹",
            "미세요": "🚪", "여세요": "🔓", "닫으세요": "🔒", "켜세요": "💡", "끄세요": "🌑",
            "입으세요": "👕", "벗으세요": "🩳", "신으세요": "👟", "마시세요": "💧", "드세요": "🍱",
            "웃으세요": "😄", "참으세요": "🤫", "말하세요": "🗣️", "노래하세요": "🎤", "춤추세요": "💃",
            "앉아": "🪑", "일어나": "🧍", "봐": "👀", "기다려": "⏳", "들어": "👂", "멈춰": "✋",
            "정리해": "🧹", "가져와": "📥", "넣어": "🗳️", "줘": "🤲", "손들어": "✋", "손내려": "👇",
            "박수": "👏", "인사해": "🙇", "줄서": "🚶", "청소해": "🧹", "닦아": "🧽", "버려": "🗑️",
            "펴": "📖", "덮어": "📕", "써": "✍️", "그려": "🎨", "칠해": "🖍️", "오려": "✂️",
            "붙여": "🩹", "접어": "📂", "찢어": "🚫", "눌러": "🔘", "당겨": "🏹", "밀어": "🚪",
            "열어": "🔓", "닫아": "🔒", "켜": "💡", "꺼": "🌑", "입어": "👕", "벗어": "🩳",
            "신어": "👟", "마셔": "💧", "먹어": "🍱", "웃어": "😄", "참아": "🤫", "말해": "🗣️",
            "노래해": "🎤", "춤춰": "💃", "선생님보세요": "🧑‍🏫", "칠판보세요": "🖍️", "친구보세요": "🤝"
        };

        const positive_words = ["잘했어", "잘했어요", "좋아요", "그래", "좋아", "성공", "최고", "맞아", "통과", "훌륭해", "딩동댕"];

        let isProcessing = false;
        let recognition;
        let timerInterval;
        let startTime;
        let currentCommand = "";
        let lastVisualUpdate = 0;
        let logs = JSON.parse(localStorage.getItem('bora_v2_1_integrity') || '[]');

        function initSpeech() {
            window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.lang = 'ko-KR';

            recognition.onresult = (event) => {
                const transcript = event.results[event.results.length - 1][0].transcript.trim().replace(/\s/g, '');
                document.getElementById('transcript-preview').innerText = `인식: ${transcript}`;
                processVoice(transcript);
            };

            recognition.onend = () => setTimeout(() => { try { recognition.start(); } catch(e) {} }, 300);
            recognition.start();
        }

        function processVoice(text) {
            const now = Date.now();
            if (!isProcessing) {
                if (now - lastVisualUpdate < 2000) return;
                const keys = Object.keys(activity_keywords).sort((a,b) => b.length - a.length);
                for (let k of keys) {
                    if (text.includes(k)) { triggerSystem(k); return; }
                }
            } else {
                for (let p of positive_words) {
                    if (text.includes(p)) { finalizeLog(true); return; }
                }
            }
        }

        function triggerSystem(cmd) {
            isProcessing = true;
            currentCommand = cmd;
            startTime = Date.now();
            lastVisualUpdate = Date.now();

            const status = document.getElementById('engine-status');
            status.innerText = "LOCK: 관찰 중";
            status.className = "status-badge status-processing";
            
            document.getElementById('card-emoji').innerText = activity_keywords[cmd];
            document.getElementById('card-word').innerText = cmd;
            document.getElementById('visual-card').classList.add('active');
            document.getElementById('timer-container').style.display = 'block';

            let timeLeft = 100;
            let limit = parseInt(localStorage.getItem('bora_target_delay') || '10');
            timerInterval = setInterval(() => {
                timeLeft -= (10 / limit);
                document.getElementById('timer-bar').style.width = timeLeft + "%";
                if (timeLeft <= 0) finalizeLog(false);
            }, 100);
        }

        function finalizeLog(isSuccess) {
            clearInterval(timerInterval);
            const endTime = Date.now();
            const delay = ((endTime - startTime) / 1000).toFixed(2);
            
            logs.unshift({
                time: new Date().toLocaleString(),
                student: localStorage.getItem('bora_student') || '미설정',
                subject: localStorage.getItem('bora_subject') || '일반',
                cmd: currentCommand,
                delay: isSuccess ? delay : "시간초과",
                status: isSuccess ? "성공" : "미수행"
            });
            localStorage.setItem('bora_v2_1_integrity', JSON.stringify(logs));
            renderLogs();
            resetSystem();
        }

        function resetSystem() {
            isProcessing = false;
            document.getElementById('visual-card').classList.remove('active');
            document.getElementById('timer-container').style.display = 'none';
            document.getElementById('engine-status').innerText = "IDLE: 지시 대기";
            document.getElementById('engine-status').className = "status-badge status-idle";
            lastVisualUpdate = Date.now();
        }

        function renderLogs() {
            document.getElementById('log-container').innerHTML = logs.map(l => `
                <div class="log-item">
                    <div style="display:flex; justify-content:space-between; font-weight:bold;">
                        <span style="color:var(--primary-cyan)">${l.cmd}</span>
                        <span style="color:${l.status === '성공' ? 'var(--success)' : 'var(--danger)'}">${l.status}</span>
                    </div>
                    <div style="font-size:0.75rem; color:#666; margin:4px 0;">${l.time}</div>
                    <div style="font-size:0.85rem;">지연 시간: ${l.delay}s</div>
                </div>
            `).join('');
        }

        function exportCSV() {
            const head = ["일시", "학생", "연구과제", "지시어", "지연시간(초)", "상태"];
            const rows = logs.map(l => [l.time, l.student, l.subject, l.cmd, l.delay, l.status]);
            const csv = "\ufeff" + head.join(",") + "\n" + rows.map(r => r.map(c => `"${c}"`).join(",")).join("\n");
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url; a.download = `BORA_Integrity_Data_${new Date().toLocaleDateString()}.csv`;
            a.click();
        }

        function toggleLogs() { document.getElementById('log-panel').classList.toggle('open'); }
        function openSettings() { document.getElementById('settings-modal').style.display = 'flex'; }
        function closeSettings() { document.getElementById('settings-modal').style.display = 'none'; }
        function saveSettings() {
            localStorage.setItem('bora_student', document.getElementById('student-name').value);
            localStorage.setItem('bora_subject', document.getElementById('subject-topic').value);
            localStorage.setItem('bora_target_delay', document.getElementById('target-delay').value);
            updateInfo(); closeSettings();
        }
        function updateInfo() {
            const s = localStorage.getItem('bora_student') || '미설정';
            const j = localStorage.getItem('bora_subject') || '일반';
            document.getElementById('info-display').innerText = `학생: ${s} | 과제: ${j}`;
        }

        window.onload = () => { initSpeech(); renderLogs(); updateInfo(); };
    </script>
</body>
</html>
